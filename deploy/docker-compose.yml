services:
  api:
    image: ${DOCKER_IMAGE:-ristudev/mindex-go-server}:${IMAGE_TAG:-latest}
    container_name: mindex-go-server
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mindex-net

  postgres:
    image: postgres:16-alpine
    container_name: mindex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mindex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindex_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mindex}
    volumes:
      - mindex_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindex} -d ${POSTGRES_DB:-mindex}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mindex-net

volumes:
  mindex_pgdata:

networks:
  mindex-net:
    driver: bridge
