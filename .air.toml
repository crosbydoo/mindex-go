root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/api"
  delay = 500
  exclude_dir = [
    "assets",
    "tmp",
    "vendor",
    "testdata",
    "bin",
    "docs",
    "deploy",
    "data",
    "migrations",
    ".git",
    ".github"
  ]
  exclude_regex = ["_test.go"]
  exclude_unchanged = true
  include_ext = ["go", "toml", "env"]
  include_file = [".env"]
  kill_delay = "2s"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = false

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
